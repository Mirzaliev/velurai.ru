services:
  postgres:
    image: mirror.gcr.io/postgres:16-alpine
    container_name: velurai-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velurai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-velurai}
      POSTGRES_DB: ${POSTGRES_DB:-velurai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velurai} -d ${POSTGRES_DB:-velurai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: mirror.gcr.io/minio/minio:latest
    container_name: velurai-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
  minio_data_dev:
